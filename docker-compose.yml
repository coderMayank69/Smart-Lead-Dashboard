version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Smart Lead Dashboard – Full-stack Docker Compose
#
# For LOCAL development:
#   1. Copy .env.example to .env at the repo root and fill in secrets
#   2. docker compose up --build
#   3. Open http://localhost  (frontend → nginx → backend via /api proxy)
#
# For RENDER deployment:
#   - Deploy `server` as a Web Service (Docker) → set env vars in Render dashboard
#   - Deploy `client` as a Web Service (Docker) → set VITE_API_URL build arg
#   - Both connect to MongoDB Atlas (no mongo container needed)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sld-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      # Use MongoDB Atlas URI — set MONGODB_URI in your .env file or Render env
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # Allow requests from the nginx frontend container on port 80
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    ports:
      - "5000:5000"
    networks:
      - sld-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (nginx) ────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # In Docker, nginx proxies /api → server container; use relative path
        VITE_API_URL: /api/v1
    container_name: sld-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - sld-network

networks:
  sld-network:
    driver: bridge
