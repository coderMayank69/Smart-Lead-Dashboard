version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sld-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: smart-lead-dashboard
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - sld-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sld-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://root:password@mongo:27017/smart-lead-dashboard?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-smart_lead_dashboard_secret_key_change_in_production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - sld-network

  # ── Frontend ─────────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sld-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - sld-network

volumes:
  mongo_data:

networks:
  sld-network:
    driver: bridge
